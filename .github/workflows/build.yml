name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Linux kernel version (e.g. 6.12.77)'
        default: ''

env:
  KERNEL_VERSION: '6.12.77'

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target:
          - name: unvr
            defconfig: unvr_defconfig
            dts: alpine-v2-ubnt-unvr
            description: "Ubiquiti UNVR (NAS)"
          - name: udmpro
            defconfig: udmpro_defconfig
            dts: alpine-v2-ubnt-udmpro
            description: "Ubiquiti UDM Pro (Gateway)"
    outputs:
      kernel_version: ${{ steps.resolve.outputs.kernel_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve kernel version
        id: resolve
        run: |
          KV="${KERNEL_VERSION}"
          if [ -n "${{ inputs.kernel_version }}" ]; then
            KV="${{ inputs.kernel_version }}"
          fi
          echo "kernel_version=${KV}" >> "$GITHUB_OUTPUT"
          echo "KERNEL_VERSION=${KV}" >> "$GITHUB_ENV"

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            bc bison flex libssl-dev libelf-dev kmod cpio \
            device-tree-compiler python3 u-boot-tools

      - name: Cache kernel source
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: linux-${{ env.KERNEL_VERSION }}.tar.xz
          key: kernel-src-${{ env.KERNEL_VERSION }}

      - name: Download kernel source
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          MAJOR="${KERNEL_VERSION%%.*}"
          curl -fLO "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KERNEL_VERSION}.tar.xz"

      - name: Extract and prepare kernel tree
        run: |
          tar xf "linux-${KERNEL_VERSION}.tar.xz"
          KDIR="linux-${KERNEL_VERSION}"

          # --- Defconfig ---
          cp configs/${{ matrix.target.defconfig }} "${KDIR}/arch/arm64/configs/${{ matrix.target.defconfig }}"

          # --- Device tree sources (copy all) ---
          cp dts/*.dts "${KDIR}/arch/arm64/boot/dts/amazon/"
          # Register all DTS files in the Makefile
          for dts in dts/*.dts; do
            base="$(basename "$dts" .dts)"
            if ! grep -q "${base}.dtb" "${KDIR}/arch/arm64/boot/dts/amazon/Makefile"; then
              echo "dtb-\$(CONFIG_ARCH_ALPINE) += ${base}.dtb" \
                >> "${KDIR}/arch/arm64/boot/dts/amazon/Makefile"
            fi
          done

          # --- PCIe patches ---
          cp patches/pcie-al-dbi-fix.c \
            "${KDIR}/drivers/pci/controller/dwc/pcie-al.c"

          cp patches/pcie-al-internal.c \
            "${KDIR}/drivers/pci/controller/pcie-al-internal.c"

          if ! grep -q 'PCIE_AL_INTERNAL' "${KDIR}/drivers/pci/controller/Makefile"; then
            echo 'obj-$(CONFIG_PCIE_AL_INTERNAL)		+= pcie-al-internal.o' \
              >> "${KDIR}/drivers/pci/controller/Makefile"
          fi

          if ! grep -q 'PCIE_AL_INTERNAL' "${KDIR}/drivers/pci/controller/Kconfig"; then
            python3 -c "
          entry = '\nconfig PCIE_AL_INTERNAL\n'
          entry += '\tbool \"Annapurna Labs Alpine V2 internal PCIe host controller\"\n'
          entry += '\tdepends on ARM64\n'
          entry += '\tdepends on PCI\n'
          entry += '\tselect PCI_HOST_COMMON\n'
          entry += '\thelp\n'
          entry += '\t  Internal PCIe host controller for Annapurna Labs Alpine V2 SoC.\n'
          entry += '\t  Configures AXI SMCC snoop registers for cache-coherent DMA on\n'
          entry += '\t  integrated peripherals (SATA, Ethernet, crypto, RAID/DMA).\n\n'
          path = '${KDIR}/drivers/pci/controller/Kconfig'
          with open(path) as f:
              content = f.read()
          pos = content.rfind('endmenu')
          content = content[:pos] + entry + content[pos:]
          with open(path, 'w') as f:
              f.write(content)
          "
          fi

      - name: Build kernel (${{ matrix.target.name }})
        run: |
          make -C "linux-${KERNEL_VERSION}" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            mrproper
          make -C "linux-${KERNEL_VERSION}" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            ${{ matrix.target.defconfig }}
          make -C "linux-${KERNEL_VERSION}" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            -j"$(nproc)" Image dtbs modules

      - name: Create uImage
        run: |
          mkimage -A arm64 -O linux -T kernel -C none \
            -a 0x00080000 -e 0x00080000 \
            -n "Linux ${KERNEL_VERSION} Alpine V2 (${{ matrix.target.name }})" \
            -d "linux-${KERNEL_VERSION}/arch/arm64/boot/Image" \
            "linux-${KERNEL_VERSION}/uImage"

      - name: Build out-of-tree modules
        run: |
          KDIR="$(pwd)/linux-${KERNEL_VERSION}"
          for mod in al_eth al_dma al_ssm al_sgpo rtl8370mb; do
            if [ -d "modules/${mod}" ]; then
              MDIR="/tmp/build-${mod}"
              cp -a "modules/${mod}" "${MDIR}"
              EXTRA=""
              if [ "${mod}" = "rtl8370mb" ] && [ -f /tmp/build-al_eth/Module.symvers ]; then
                EXTRA="KBUILD_EXTRA_SYMBOLS=/tmp/build-al_eth/Module.symvers"
              fi
              make -C "${KDIR}" \
                ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
                W=0 M="${MDIR}" ${EXTRA} modules
            fi
          done

      - name: Collect release artifacts
        id: collect
        run: |
          KDIR="linux-${KERNEL_VERSION}"
          REF="${GITHUB_REF_NAME}"
          [[ "${REF}" == v* ]] || REF="dev-$(git rev-parse --short HEAD)"

          OUTDIR="linux-alpine-v2-${{ matrix.target.name }}-${REF}"
          mkdir -p "${OUTDIR}"

          # --- Boot files ---
          cp "${KDIR}/uImage" "${OUTDIR}/"
          cp "${KDIR}/arch/arm64/boot/Image" "${OUTDIR}/"
          cp "${KDIR}/arch/arm64/boot/dts/amazon/${{ matrix.target.dts }}.dtb" "${OUTDIR}/"

          # --- In-tree modules ---
          make -C "${KDIR}" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            INSTALL_MOD_PATH="$(pwd)/${OUTDIR}" \
            INSTALL_MOD_STRIP=1 \
            modules_install

          # --- Out-of-tree modules ---
          MODDIR="${OUTDIR}/lib/modules/${KERNEL_VERSION}/extra"
          mkdir -p "${MODDIR}"
          for mod in al_eth al_dma al_ssm al_sgpo rtl8370mb; do
            find "/tmp/build-${mod}" -name '*.ko' -exec cp {} "${MODDIR}/" \; 2>/dev/null || true
          done
          aarch64-linux-gnu-strip --strip-unneeded "${MODDIR}"/*.ko 2>/dev/null || true

          # --- Module dependencies ---
          depmod -b "$(pwd)/${OUTDIR}" "${KERNEL_VERSION}"

          # --- Cleanup symlinks ---
          rm -f "${OUTDIR}/lib/modules/${KERNEL_VERSION}/build"
          rm -f "${OUTDIR}/lib/modules/${KERNEL_VERSION}/source"

          # --- Symbol map ---
          cp "${KDIR}/System.map" "${OUTDIR}/"

          # --- Checksums ---
          (cd "${OUTDIR}" && find . -type f ! -name SHA256SUMS -exec sha256sum {} + | sort -k2) \
            > "${OUTDIR}/SHA256SUMS"

          # --- Tarball ---
          tar czf "${OUTDIR}.tar.gz" "${OUTDIR}"
          echo "ARTIFACT=${OUTDIR}.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=linux-alpine-v2-${{ matrix.target.name }}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT }}
          compression-level: 0

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-alpine-v2-unvr/linux-alpine-v2-unvr-*.tar.gz
            linux-alpine-v2-udmpro/linux-alpine-v2-udmpro-*.tar.gz
          generate_release_notes: true
          body: |
            ## Linux ${{ needs.build.outputs.kernel_version }} for Alpine V2

            Pre-built kernels and modules for Annapurna Labs Alpine V2 (AL-314) SoC.
            Both targets use U-Boot — flash `uImage` + DTB to the kernel partition.

            ### Targets

            | Target | Tarball | Device | Use Case |
            |--------|---------|--------|----------|
            | **unvr** | `linux-alpine-v2-unvr-*.tar.gz` | Ubiquiti UNVR | secfirstNAS |
            | **udmpro** | `linux-alpine-v2-udmpro-*.tar.gz` | Ubiquiti UDM Pro | secfirstGW |

            ### Contents (per target)

            | File | Description |
            |------|-------------|
            | `uImage` | U-Boot kernel image (bootm) |
            | `Image` | Raw ARM64 kernel binary (booti) |
            | `*.dtb` | Device tree blob |
            | `lib/modules/*/extra/al_eth.ko` | 1GbE + 10GbE Ethernet |
            | `lib/modules/*/extra/rtl8370mb_init.ko` | RTL8370MB 8-port switch init (UDM Pro only) |
            | `lib/modules/*/extra/al_dma.ko` | RAID5/6 HW parity (XOR/PQ) |
            | `lib/modules/*/extra/al_ssm.ko` | HW AES-XTS/CBC crypto acceleration |
            | `lib/modules/*/extra/al_sgpo.ko` | Serial GPIO (HDD/SATA LEDs) |
            | `lib/modules/*/kernel/` | In-tree kernel modules |

            ### UDM Pro extras (vs UNVR)
            - WireGuard VPN kernel module
            - Full nftables/netfilter stack (gateway firewall)
            - Bridge + 802.1Q VLAN filtering
            - Traffic shaping (HTB, SFQ, TBF, ingress)
            - USB ACM (LCM front panel display)
            - IPv6 NAT + masquerade

            ### Quick Start

            ```bash
            tar xzf linux-alpine-v2-<target>-*.tar.gz
            scp uImage *.dtb root@<device>:/boot/
            scp -r lib/modules/* root@<device>:/lib/modules/
            ssh root@<device> "depmod -a && reboot"
            ```
